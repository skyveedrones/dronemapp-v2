[phases.setup]
  nixPkgs = ["nodejs", "python3"] # Python is often needed for node-gyp/build tools

[phases.build]
  cmds = [
    "npm install",
    "node scripts/generate-version.mjs && node scripts/ensure-version.mjs && vite build --outDir dist/public && esbuild server/_core/index.ts --platform=node --packages=external --bundle --format=esm --outdir=dist"
  ]

[start]
  cmd = "node dist/server/auth-only.js"
